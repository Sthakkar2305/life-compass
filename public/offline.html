<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Life Changer Book Offline</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(245,158,11,.24), transparent 32rem),
          radial-gradient(circle at bottom right, rgba(37,99,235,.2), transparent 32rem),
          #f8f1e3;
        color: #172033;
      }
      main {
        width: min(92vw, 520px);
        padding: 32px;
        border-radius: 22px;
        background: rgba(255,255,255,.72);
        box-shadow: 0 24px 80px rgba(58,38,15,.18);
        backdrop-filter: blur(18px);
      }
      h1 { margin: 0 0 10px; font-size: clamp(2rem, 8vw, 3.6rem); line-height: .95; }
      p { margin: 0; line-height: 1.7; font-size: 1rem; }
    </style>
  </head>
  <body>
    <main>
      <h1>Life Changer Book</h1>
      <p>You are offline, and that is okay. Reopen the app from your installed icon to continue with cached pages and locally saved entries.</p>
    </main>
  </body>
</html>
